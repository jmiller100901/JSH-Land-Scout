<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSH Land Scout</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Landing / Market Selector -->
    <div id="market-selector" class="screen active">
        <div class="selector-header">
            <div class="logo">
                <span class="logo-icon">◆</span>
                <h1>JSH Land Scout</h1>
            </div>
            <p class="tagline">Industrial Land Site Intelligence</p>
        </div>
        <div class="market-grid">
            <div class="market-card" data-market="dfw">
                <div class="market-card-inner">
                    <h2>Dallas–Fort Worth</h2>
                    <div class="market-meta">
                        <span class="stat-pill" id="dfw-sites-count">— sites</span>
                        <span class="stat-pill" id="dfw-submarkets-count">— submarkets</span>
                    </div>
                </div>
            </div>
            <div class="market-card" data-market="austin">
                <div class="market-card-inner">
                    <h2>Austin</h2>
                    <div class="market-meta">
                        <span class="stat-pill" id="austin-sites-count">— sites</span>
                        <span class="stat-pill" id="austin-submarkets-count">— submarkets</span>
                    </div>
                </div>
            </div>
            <div class="market-card" data-market="san-antonio">
                <div class="market-card-inner">
                    <h2>San Antonio</h2>
                    <div class="market-meta">
                        <span class="stat-pill" id="san-antonio-sites-count">— sites</span>
                        <span class="stat-pill" id="san-antonio-submarkets-count">— submarkets</span>
                    </div>
                </div>
            </div>
            <div class="market-card" data-market="houston">
                <div class="market-card-inner">
                    <h2>Houston</h2>
                    <div class="market-meta">
                        <span class="stat-pill" id="houston-sites-count">— sites</span>
                        <span class="stat-pill" id="houston-submarkets-count">— submarkets</span>
                    </div>
                </div>
            </div>
            <div class="market-card" data-market="charlotte">
                <div class="market-card-inner">
                    <h2>Charlotte</h2>
                    <div class="market-meta">
                        <span class="stat-pill" id="charlotte-sites-count">— sites</span>
                        <span class="stat-pill" id="charlotte-submarkets-count">— submarkets</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Map View -->
    <div id="map-view" class="screen">
        <!-- Top Bar -->
        <div id="top-bar">
            <button id="btn-back" class="top-btn" title="Back to markets">
                <span>&#8592;</span> Markets
            </button>
            <h2 id="market-title"></h2>
            <div id="layer-controls">
                <button class="layer-btn active" data-layer="street" title="Street Map">Street</button>
                <button class="layer-btn" data-layer="satellite" title="Satellite Imagery">Satellite</button>
                <button class="layer-btn" data-layer="topo" title="Topography">Topo</button>
            </div>
            <div id="overlay-controls">
                <label class="toggle-label">
                    <input type="checkbox" id="toggle-submarkets" checked>
                    <span>Submarkets</span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="toggle-sites" checked>
                    <span>Land Sites</span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="toggle-highways">
                    <span>Highways</span>
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="toggle-airports">
                    <span>Airports</span>
                </label>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map"></div>

        <!-- Submarket Info Panel (slides in from right) -->
        <div id="submarket-panel" class="side-panel">
            <button id="panel-close" class="panel-close-btn">&times;</button>
            <h3 id="submarket-name"></h3>
            <div id="submarket-stats"></div>
        </div>

        <!-- Land Site Info Panel (slides in from right) -->
        <div id="site-panel" class="side-panel">
            <button id="site-panel-close" class="panel-close-btn">&times;</button>
            <h3 id="site-name"></h3>
            <div id="site-details"></div>
        </div>

        <!-- Score Legend -->
        <div id="score-legend">
            <h4>Site Score</h4>
            <div class="legend-gradient"></div>
            <div class="legend-labels">
                <span>0</span>
                <span>50</span>
                <span>100</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/markets.js"></script>
    <script src="data/submarkets-dfw.js"></script>
    <script src="data/submarkets-austin.js"></script>
    <script src="data/submarkets-san-antonio.js"></script>
    <script src="data/submarkets-houston.js"></script>
    <script src="data/submarkets-charlotte.js"></script>
    <script src="data/sites.js"></script>
    <script src="data/industrial-stats.js"></script>
    <script src="js/scoring.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
